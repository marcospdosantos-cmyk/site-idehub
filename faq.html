<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perguntas Frequentes — Ide.hub</title>
  <meta name="description" content="Tire suas dúvidas sobre entrega, pagamento, trocas e tamanhos. Ide.hub — Streetwear cristão premium.">
  <meta property="og:title" content="Perguntas Frequentes — Ide.hub">
  <meta property="og:description" content="Tire suas dúvidas sobre entrega, pagamento, trocas e tamanhos.">
  <meta property="og:image" content="assets/hero-1.webp">
  <meta property="og:locale" content="pt_BR">
  <meta name="theme-color" content="#100f0d">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f2752f'/><text x='16' y='23' font-size='18' text-anchor='middle' fill='white' font-family='Georgia,serif' font-weight='bold'>i</text></svg>">
  <link rel="dns-prefetch" href="https://unpkg.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="cart.jsx"></script>
  <script type="text/babel" src="navbar.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="overlays.jsx"></script>
  <script type="text/babel" src="content-page.jsx"></script>

  <script type="text/babel">
    const S = {
      hero: { background: "var(--ide-ink)", padding: "80px 20px 64px", textAlign: "center" },
      crumb: { fontSize: 12, color: "rgba(255,255,255,.4)", marginBottom: 20 },
      crumbA: { color: "rgba(255,255,255,.4)", textDecoration: "none" },
      h1: { color: "var(--ide-cream)", fontSize: "clamp(2rem, 5vw, 3.5rem)", fontFamily: "var(--font-serif)", margin: "0 auto", lineHeight: 1.15 },
      body: { maxWidth: 720, margin: "0 auto", padding: "60px 20px 80px" },
      itemWrap: { borderBottom: "1px solid var(--ide-stone)" },
      btn: { width: "100%", textAlign: "left", padding: "22px 0", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 },
      q: { fontFamily: "var(--font-sans)", fontWeight: 600, fontSize: "1rem", color: "var(--ide-ink)", lineHeight: 1.4 },
      icon: { flexShrink: 0, color: "var(--ide-accent)", display: "flex", transition: "transform .2s" },
      a: { color: "var(--ide-ink-muted)", lineHeight: 1.75, paddingBottom: 22, margin: 0, fontSize: ".95rem" },
      cta: { background: "var(--ide-ink)", textAlign: "center", padding: "64px 20px" },
      ctaH: { color: "var(--ide-cream)", margin: "0 0 24px", fontFamily: "var(--font-serif)", fontSize: "clamp(1.4rem, 3vw, 2rem)" },
    };

    function FAQPage() {
      const faqs = [
        { q: "Qual é o prazo de entrega?", a: "Para todo o Brasil, o prazo é de 5 a 10 dias úteis após a confirmação do pagamento. Para Pix e boleto, a contagem começa após a compensação. Para cartão, após a aprovação da operadora." },
        { q: "Quais são as formas de pagamento?", a: "Aceitamos Pix com 5% de desconto, cartão de crédito em até 6x sem juros e boleto bancário. O pedido é finalizado pelo WhatsApp com um de nossos atendentes." },
        { q: "Como funciona a troca ou devolução?", a: "Você tem 30 dias a partir da entrega para solicitar troca. O produto deve estar sem uso, com etiqueta e na embalagem original. A primeira troca tem frete grátis. Veja todos os detalhes na nossa política de trocas." },
        { q: "Como escolho o tamanho certo?", a: "Temos um guia completo com medidas de tórax, ombro e comprimento para cada tamanho, tanto para modelos básicos quanto oversized. Consulte o guia de tamanhos ou fale com a gente pelo WhatsApp antes de pedir." },
        { q: "Vocês emitem nota fiscal?", a: "Sim. Todos os pedidos têm nota fiscal eletrônica (NF-e), enviada por e-mail após a confirmação da compra." },
        { q: "Como rastrear meu pedido?", a: "Assim que o pedido for despachado, você recebe o código de rastreio diretamente pelo WhatsApp. Você acompanha pelo site dos Correios ou da transportadora." },
        { q: "Vocês fazem personalização para igrejas?", a: "Sim! Fazemos projetos personalizados para igrejas, ministérios, eventos, grupos de jovens e empresas cristãs. Fale com a gente pelo WhatsApp para um orçamento sem compromisso." },
        { q: "Qual é o material das camisetas?", a: "Usamos 100% algodão fio 30 penteado nos modelos básicos e malha cotton pesada 340g nos modelos oversized. A composição completa está descrita em cada produto." },
        { q: "Como entrar em contato?", a: "Pelo WhatsApp +55 (42) 98413-7740, de segunda a sábado das 9h às 18h. A gente responde rápido." },
      ];

      const [open, setOpen] = React.useState(null);

      return (
        <ContentPage title="Perguntas Frequentes">
          <section style={S.hero}>
            <nav style={S.crumb}>
              <a href="Homepage @ide.hub.html" style={S.crumbA}>Início</a>
              <span style={{ margin: "0 8px" }}>/</span>
              <span style={{ color: "rgba(255,255,255,.75)" }}>FAQ</span>
            </nav>
            <span className="t-eyebrow t-eyebrow-light" style={{ display: "block", marginBottom: 12 }}>Atendimento</span>
            <h1 style={S.h1}>Perguntas <em style={{ fontStyle: "italic", color: "var(--ide-accent-soft)" }}>frequentes.</em></h1>
          </section>

          <section style={S.body}>
            {faqs.map((item, i) => (
              <div key={i} style={S.itemWrap}>
                <button onClick={() => setOpen(open === i ? null : i)} style={S.btn}>
                  <span style={S.q}>{item.q}</span>
                  <span style={{ ...S.icon, transform: open === i ? "rotate(45deg)" : "none" }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 5v14M5 12h14"/>
                    </svg>
                  </span>
                </button>
                {open === i && <p style={S.a}>{item.a}</p>}
              </div>
            ))}
          </section>

          <section style={S.cta}>
            <span className="t-eyebrow t-eyebrow-light" style={{ display: "block", marginBottom: 12 }}>Ainda com dúvida?</span>
            <h3 style={S.ctaH}>A gente responde <em style={{ fontStyle: "italic", color: "var(--ide-accent-soft)" }}>no WhatsApp.</em></h3>
            <a href="https://wa.me/5542984137740" target="_blank" rel="noopener" className="ide-btn ide-btn-orange">
              Falar com a gente
              <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor">
                <path d="M16 3C9.4 3 4 8.4 4 15c0 2.3.6 4.5 1.9 6.5L4 29l7.7-1.8c1.9 1 4.1 1.6 4.3 1.6C22.6 28 28 22.6 28 16c0-7-5.4-13-12-13zm0 22.2c-1.7 0-3.4-.4-4.9-1.3l-.3-.1-3.2.7.7-3.2-.2-.3a9.9 9.9 0 1 1 17.4-6c0 5.5-4.5 10.2-9.5 10.2z"/>
              </svg>
            </a>
          </section>
        </ContentPage>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FAQPage />);
  </script>
</body>
</html>
