<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada — Ide.hub</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#100f0d">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--ide-ink); color: var(--ide-cream); font-family: var(--font-sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
    .big { font-size: clamp(6rem, 20vw, 14rem); font-family: var(--font-serif); line-height: 1; color: var(--ide-accent); opacity: .18; user-select: none; position: absolute; }
    .inner { position: relative; z-index: 1; }
    .eyebrow { font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; color: var(--ide-accent); display: block; margin-bottom: 16px; }
    h1 { font-family: var(--font-serif); font-size: clamp(2rem, 6vw, 3.5rem); line-height: 1.15; margin-bottom: 16px; }
    p { color: rgba(255,255,255,.55); font-size: .95rem; line-height: 1.65; margin-bottom: 36px; max-width: 380px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: var(--ide-accent); color: white; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: .9rem; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <span class="big" aria-hidden="true">404</span>
  <div class="inner">
    <span class="eyebrow">Página não encontrada</span>
    <h1>Essa peça saiu<br>de <em>coleção.</em></h1>
    <p>O endereço que você acessou não existe ou foi movido. Mas a coleção está no ar.</p>
    <a href="Homepage @ide.hub.html" class="btn">
      Voltar à loja
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="m13 6 6 6-6 6"/>
      </svg>
    </a>
  </div>
</body>
</html>
